<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Definitions for gradients -->
  <defs>
    <linearGradient id="mountGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669" /> <!-- Medium Green -->
      <stop offset="100%" stop-color="#064e3b" /> <!-- Dark Forest Green -->
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" /> <!-- Gold -->
      <stop offset="100%" stop-color="#f59e0b" /> <!-- Amber -->
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a" /> <!-- Deep Blue -->
      <stop offset="100%" stop-color="#3b82f6" /> <!-- Light Royal Blue -->
    </linearGradient>
  </defs>

  <!-- Circular Background representing Unity & Integrity -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#f59e0b" stroke-width="4" />
  <circle cx="100" cy="100" r="90" fill="#f8fafc" />

  <!-- The Sun -->
  <circle cx="100" cy="85" r="30" fill="url(#sunGrad)" />

  <!-- Mount Kenya (Stylized Mountain peaks) -->
  <polygon points="100,50 50,130 150,130" fill="url(#mountGrad)" />
  <polygon points="115,70 80,130 150,130" fill="#047857" opacity="0.8" />
  
  <!-- Snow peak details -->
  <polygon points="100,50 90,66 96,69 100,64 104,69 110,66" fill="#ffffff" />
  <polygon points="115,70 108,82 113,85 115,81 118,85 122,82" fill="#ffffff" opacity="0.9" />

  <!-- River passing through the mountain valley -->
  <path d="M100,105 Q95,115 105,125 T100,140" fill="none" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" />
  
  <!-- Coffee and Tea leaves framing the base -->
  <!-- Left Leaf (Tea) -->
  <path d="M45,135 Q20,130 35,105 Q50,115 45,135 Z" fill="#059669" />
  <path d="M35,105 Q38,120 45,135" fill="none" stroke="#fbbf24" stroke-width="1.5" />
  
  <!-- Right Leaf (Coffee) -->
  <path d="M155,135 Q180,130 165,105 Q150,115 155,135 Z" fill="#059669" />
  <path d="M165,105 Q162,120 155,135" fill="none" stroke="#fbbf24" stroke-width="1.5" />

  <!-- Ribbon at the bottom for "MCRB" text -->
  <path d="M30,145 L170,145 L160,165 L40,165 Z" fill="url(#skyGrad)" />
  <text x="100" y="159" font-family="'Outfit', sans-serif" font-weight="bold" font-size="11" fill="#ffffff" text-anchor="middle" letter-spacing="1">MCRB</text>

  <!-- Gold stars representing quality and excellence -->
  <polygon points="100,15 103,22 110,22 105,26 107,33 100,29 93,33 95,26 90,22 97,22" fill="#fbbf24" />
</svg>
